name: Publish

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: read
  packages: write

env:
  # Pinned to a version tag rather than a digest. graalvm-pi-builder is a first-party image
  # we control; retagging bookworm-25.0.2 would be an intentional act. Digest pinning adds
  # maintenance burden (every image rebuild produces a new digest) for negligible benefit here.
  GRAALVM_PI_BUILDER_IMAGE: ghcr.io/lofthouse-dev/graalvm-pi-builder:bookworm-25.0.2

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Java 25 (with GitHub Packages auth)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Set up graalvm-pi-builder container
        uses: ./.github/actions/setup-graalvm-pi-builder
        with:
          image: ${{ env.GRAALVM_PI_BUILDER_IMAGE }}

      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
